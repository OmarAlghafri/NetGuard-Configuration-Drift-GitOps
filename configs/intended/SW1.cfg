!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname SW1
!
boot-start-marker
boot-end-marker
!
enable secret 0 NetGuardLab123
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
no ip domain lookup
ip domain name lab.local
!
multilink bundle-name authenticated
!
username admin privilege 15 secret 0 NetGuardLab123
archive
 log config
  hidekeys
!
spanning-tree mode pvst
spanning-tree extend system-id
!
ip tcp synwait-time 5
ip ssh version 2
!
vlan 10
 name USERS
!
vlan 20
 name SERVERS
!
vlan 30
 name MGMT
!
interface FastEthernet0/0
 description Management :: NetGuard
 ip address 192.168.56.22 255.255.255.0
 duplex auto
 speed auto
!
interface FastEthernet1/0
 description USERS access port
 switchport access vlan 10
 switchport mode access
 spanning-tree portfast
!
interface FastEthernet1/1
 description USERS access port
 switchport access vlan 10
 switchport mode access
 spanning-tree portfast
!
interface FastEthernet1/2
 description SERVERS access port
 switchport access vlan 20
 switchport mode access
 spanning-tree portfast
!
interface FastEthernet1/3
 description SERVERS access port
 switchport access vlan 20
 switchport mode access
 spanning-tree portfast
!
interface Vlan30
 description In-band management SVI
 ip address 10.30.30.1 255.255.255.0
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
banner motd ^C
NetGuard managed device. Authorized access only.
Configuration is under drift control; unauthorized changes are detected and logged.
^C
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login local
 transport input ssh
!
end
