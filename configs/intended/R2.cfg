!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R2
!
boot-start-marker
boot-end-marker
!
enable secret 0 NetGuardLab123
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
no ip domain lookup
ip domain name lab.local
!
multilink bundle-name authenticated
!
username admin privilege 15 secret 0 NetGuardLab123
archive
 log config
  hidekeys
!
ip tcp synwait-time 5
ip ssh version 2
!
interface Loopback0
 description NetGuard router-id
 ip address 2.2.2.2 255.255.255.255
!
interface FastEthernet0/0
 description Link to R1 :: OSPF area 0
 ip address 10.0.12.2 255.255.255.252
 duplex auto
 speed auto
!
interface FastEthernet0/1
 description Management :: NetGuard
 ip address 192.168.56.21 255.255.255.0
 duplex auto
 speed auto
!
router ospf 1
 router-id 2.2.2.2
 log-adjacency-changes
 passive-interface FastEthernet0/1
 network 2.2.2.2 0.0.0.0 area 0
 network 10.0.12.0 0.0.0.3 area 0
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
access-list 10 remark NetGuard permit management subnet for VTY
access-list 10 permit 192.168.56.0 0.0.0.255
!
banner motd ^C
NetGuard managed device. Authorized access only.
Configuration is under drift control; unauthorized changes are detected and logged.
^C
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 access-class 10 in
 login local
 transport input ssh
!
end
